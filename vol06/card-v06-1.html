<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
<title>Vol.06 封面</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#fffef5; font-family:"PingFang SC","Hiragino Sans GB",sans-serif; }
  .card { width:1080px; height:1350px; background:#fffef5; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header-strip { background:#F9A825; padding:22px 75px; display:flex; align-items:center; justify-content:space-between; }
  .header-strip .brand { font-size:26px; color:#fff; letter-spacing:5px; font-weight:800; }
  .header-strip .tag { font-size:22px; color:#E3F2FD; letter-spacing:3px; font-weight:700; }
  .content { flex:1; display:flex; flex-direction:column; justify-content:flex-start; padding:52px 75px 60px; }
  .title-group { margin-bottom:46px; }
  .title-group .line { font-family:"Noto Sans SC","PingFang SC","STHeiti",sans-serif; font-size:120px; font-weight:900; color:#1E88E5; line-height:1.2; letter-spacing:8px; text-shadow:2px 2px 0 #F9A825, 3px 3px 0 rgba(249,168,37,0.3); }
  .body-short { width:100%; }
  .body-short p { font-size:38px; color:#2d3436; line-height:1.6; letter-spacing:1.5px; margin:0; }
  .body-short .para { margin-bottom:46px; }
  .body-short .para:last-child { margin-bottom:0; }
  .hl-red { background:linear-gradient(180deg,transparent 55%,#ff7675 55%); padding:0 4px; font-weight:700; }
  .hl-yellow{ background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%); padding:0 4px; font-weight:700; }
  .hl-teal { color:#00b894; font-weight:700; background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%); padding:0 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.06</span></div>
  <div class="content">
    <div class="title-group">
      <div class="line">保持生命力</div>
      <div class="line">可能是唯一</div>
      <div class="line">能做的事了</div>
    </div>
    <div class="body-short">
      <div class="para"><p>讨论AI知识库的时候，我察觉了两件事。</p></div>
      <div class="para"><p>人总结自己的知识库，所谓蒸馏自己，<br>是一种<span class="hl-yellow">被动思考、主动献祭；</span></p></div>
      <div class="para"><p>没有经过体认的知识库，没有生命力。<br><span class="hl-yellow">不是第二大脑，是第二垃圾箱。</span></p></div>
    </div>
  </div>
</div>
</body>
</html>
