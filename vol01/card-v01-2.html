<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.01 卡2</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:52px 75px 60px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:44px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}.hl-blue{background:linear-gradient(180deg,transparent 55%,#74b9ff 55%);padding:0 4px;font-weight:700}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.01</span></div><div class="body-text"><div class="para"><p>关于语言，我有过一个观察。</p></div><div class="para"><p>我们这一代广东人的粤语，</p><p>已充分和普通话、网络梗<span class="hl-teal">「化合共生」</span>。</p><p>但我却时常在华人脱口秀中，</p><p>找到<span class="hl-yellow">「古老粤语」</span>的踪迹。</p></div><div class="para"><p>曾经共脉的语言，</p><p>因为远距离的物理隔绝、</p><p>发展环境的分治、</p><p>特定族群的传承，</p><p>反倒原汁原味地留了下来。</p></div><div class="para"><p>我把这种现象叫做<br><span class="hl-red">「文化飞地」</span>。</p></div></div></div></body></html>
