<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.01 卡6</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:44px 75px 55px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:40px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}.hl-blue{background:linear-gradient(180deg,transparent 55%,#74b9ff 55%);padding:0 4px;font-weight:700}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.01</span></div><div class="body-text"><div class="para"><p>更巧合的是，</p><p>算法给我推荐的月球建城科普，</p><p>上面写着：</p></div><div class="para"><p><span class="hl-yellow">「地球的童年，刻在月球上」</span>。</p></div><div class="para"><p>原来文化飞地、时光琥珀、地月史诗，</p><p>远在天边，又全在算法里。</p></div><div class="para"><p>月球几乎没有被侵蚀。</p><p><span class="hl-blue">四十多亿年前的撞击坑</span>至今原样留在那里。</p></div><div class="para"><p>早期地球遭到剧烈撞击时，</p><p>碎片飞出引力范围，落入月球，至今埋在月壤里。</p></div><div class="para"><p>如果能找到这些来自地球的陨石，</p><p>月岩将读出地球最早几亿年的地质记录。<br>而地球自己，<span class="hl-red">早把这一页撕掉了</span>。</p></div><div class="para"><p>地球的童年，<span class="hl-yellow">真的刻在月球上</span>。</p></div></div></div></body></html>
