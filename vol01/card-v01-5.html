<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.01 卡5</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:42px 75px 55px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:38px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.01</span></div><div class="body-text"><div class="para"><p>图书馆、供销社、基督教堂、工人俱乐部，</p><p>那些曾经鲜活的时光，<span class="hl-teal">如琥珀般静止</span>。</p></div><div class="para"><p>在漫长的岁月里，它留住了年轻的样貌，</p></div><div class="para"><p>在漫长的年月里，老去的居民搬了回来，</p><p>重新发现它、滋养它，把它称作<span class="hl-yellow">「记忆之城」</span>。</p></div><div class="para"><p>亲切，悲凉，又充满<span class="hl-red">史诗感</span>。</p></div><div class="para"><p>后来我又想起更多这样的地方：</p><p>益阳的691基地、莫干山的荫山街，</p><p>更远的，图卢姆的玛雅遗址。</p></div><div class="para"><p><span class="hl-yellow">这些曾经的停驻似乎都为了某日的重启。</span></p></div></div></div></body></html>
