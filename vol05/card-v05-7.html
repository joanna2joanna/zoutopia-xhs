<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>Vol.05 Card 7</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#fffef7; font-family:"PingFang SC","Hiragino Sans GB",sans-serif; }
  .card { width:1080px; height:1350px; background:#fffef7; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header-strip { background:#F9A825; padding:22px 75px; display:flex; align-items:center; justify-content:space-between; }
  .header-strip .brand { font-size:26px; color:#fff; letter-spacing:5px; font-weight:800; }
  .header-strip .tag { font-size:22px; color:#E3F2FD; letter-spacing:3px; font-weight:700; }
  .body-text { flex:1; padding:50px 75px 60px; display:flex; flex-direction:column; justify-content:center; border-right:12px solid transparent; border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1; }
  .body-text .para { margin-bottom:40px; } .body-text .para:last-child { margin-bottom:0; }
  .body-text p { font-size:38px; line-height:1.5; letter-spacing:1.2px; margin:0; color:#2d3436; padding-right:16px; }
  .hl-red { background:linear-gradient(180deg,transparent 55%,#ff7675 55%); padding:0 4px; font-weight:700; }
  .hl-yellow{ background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%); padding:0 4px; font-weight:700; }
  .hl-teal { color:#00b894; font-weight:700; background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%); padding:0 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.05</span></div>
  <div class="body-text">
    <div class="para"><p>我的前半生看似标准，</p><p><span class="hl-red">里面也藏了一些小插曲。</span></p></div>
    <div class="para"><p>在青少年时期那些</p><p>日复一日的标准循环里，</p><p>我跑去参加信息学竞赛班，</p><p>第一次知道了<span class="hl-yellow">递归和随机</span>。</p></div>
    <div class="para"><p>随机跑在递归的结构上，</p><p><span class="hl-red">底层的不变性兜住了</span></p><p><span class="hl-red">上层的不可预知。</span></p></div>
    <div class="para"><p>于是，</p><p>四十几岁的我坐在电脑前，</p><p>写下这些与职业无关的字。</p></div>
    <div class="para"><p><span class="hl-red">我相信并接纳</span></p><p><span class="hl-red">这种可预判的随机。</span></p></div>
  </div>
</div>
</body>
</html>
