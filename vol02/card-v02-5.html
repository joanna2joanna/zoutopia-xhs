<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.02 卡5</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:46px 75px 55px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:40px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}.hl-blue{background:linear-gradient(180deg,transparent 55%,#74b9ff 55%);padding:0 4px;font-weight:700}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.02</span></div><div class="body-text"><div class="para"><p>二.值钱的从来不是证书，是比例。</p></div><div class="para"><p>高等教育毛入学率<span class="hl-blue">二十年从21%涨到了60%</span>。</p><p>拿到了以前够不着的证书，</p><p>但那条线已经不在原地了。</p></div><div class="para"><p>证书正在从<span class="hl-yellow">往上走的梯子</span>，</p><p>变成<span class="hl-red">防止往下掉的保险绳</span>。</p></div><div class="para"><p>三.高校的合并和调整，都是理性重构。</p></div><div class="para"><p>高校作为人才培育重地，</p><p>本就是跟着政策和需求走。</p><p>过去五年撤销了超过<span class="hl-teal">五千个学科方向</span>，</p><p>不是教育走向没落，</p><p>只是看清形势，校准方向罢了。</p></div></div></div></body></html>
