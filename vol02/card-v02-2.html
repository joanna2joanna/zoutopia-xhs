<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.02 卡2</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:42px 75px 55px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:38px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}.hl-blue{background:linear-gradient(180deg,transparent 55%,#74b9ff 55%);padding:0 4px;font-weight:700}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.02</span></div><div class="body-text"><div class="para"><p>每次站到政策前沿的，</p><p>恰好都是<span class="hl-yellow">受教育程度靠前</span>的那批人。</p></div><div class="para"><p>1968年，上山下乡。</p><p>以"知识青年到农村去"之名。</p><p>主力是初中以上学历的青年，</p><p>正是当时全国受教育程度的<span class="hl-blue">前6%</span>。</p><p>那年，城镇化率不到18%，</p><p>城乡之间隔着一道户籍的墙。</p></div><div class="para"><p>2014年，双创。</p><p>以"大众创业、万众创新"之名。</p><p>走上这条路的，六成是本科生。</p><p>当时全国本科以上<span class="hl-blue">不到8%</span>。</p><p>那年，城镇化率刚过55%，</p><p>人往城里走，城市却接不住。</p></div></div></div></body></html>
