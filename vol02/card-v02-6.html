<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.02 卡6</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:46px 75px 55px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:40px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.02</span></div><div class="body-text"><div class="para"><p>撤销的学科方向，被换上了<span class="hl-teal">AI和具身智能</span>，</p><p>AI正是前两个时代没有显形的变量。</p></div><div class="para"><p>AI在取代初级脑力劳动，</p><p>初级的翻译、编程、设计和文案——</p><p>这些大学毕业生的起跳板，</p><p>一个有经验的员工加AI链，<span class="hl-yellow">就能取代</span>。</p><p>这也是为什么OPC能成立。</p></div><div class="para"><p>一个人加工具就是一支团队，</p><p><span class="hl-red">另一面，也是这个人，扛下了所有。</span></p></div><div class="para"><p>比上山下乡灵活。</p><p>比双创走得更远。</p><p>并不比它们稳妥。</p></div></div></div></body></html>
