<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.02 卡3</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:46px 75px 55px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:40px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.02</span></div><div class="body-text"><div class="para"><p>2026年，OPC。</p><p>以"一个人就是一支团队"之名。</p><p>走进这扇门的，</p><p><span class="hl-red">几乎全部受过高等教育</span>。</p><p>门槛不在地域，在综合能力。</p></div><div class="para"><p>当然，这只是教育这一个侧面。</p></div><div class="para"><p>那么，为什么三次，都砸中了同一类人。</p><p>减轻矛盾？应对问题？</p><p>还是，避免不确定因素？</p><p>暂且不想。</p></div><div class="para"><p>但教育，曾经被视作<span class="hl-yellow">对未来的承诺</span>。</p><p>当承诺落空时，</p><p>被承诺得更多的人，</p><p>反而先被推到前方。</p></div></div></div></body></html>
