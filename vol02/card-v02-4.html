<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Vol.02 卡4</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e8f5f0;font-family:"PingFang SC","Hiragino Sans GB",sans-serif}.card{width:1080px;height:1350px;background:#fffef7;display:flex;flex-direction:column;position:relative;overflow:hidden}.header-strip{background:#F9A825;padding:22px 75px;display:flex;align-items:center;justify-content:space-between;border-right:12px solid transparent}.header-strip .brand{font-size:26px;color:#fff;letter-spacing:5px;font-weight:800}.header-strip .tag{font-size:22px;color:#E3F2FD;letter-spacing:3px;font-weight:700}.body-text{flex:1;padding:52px 75px 60px;display:flex;flex-direction:column;justify-content:center;border-right:12px solid transparent;border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1}.body-text .para{margin-bottom:44px}.body-text .para:last-child{margin-bottom:0}.body-text p{font-size:38px;line-height:1.5;letter-spacing:1.2px;margin:0;color:#2d3436;padding-right:16px}.hl-red{background:linear-gradient(180deg,transparent 55%,#ff7675 55%);padding:0 4px;font-weight:700}.hl-yellow{background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%);padding:0 4px;font-weight:700}.hl-teal{color:#00b894;font-weight:700;background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%);padding:0 4px}</style></head><body><div class="card"><div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.02</span></div><div class="body-text"><div class="para"><p>如果教育是这些故事的共同线索，</p><p>那它本身，在发生什么变化。</p></div><div class="para"><p>一.教育似乎陷入了<span class="hl-teal">回报率怪圈</span>。</p></div><div class="para"><p>教育的目标从来就不是提高工资。</p><p>可我们偏用工资丈量它。</p><p>翻了两组2024年的数据，</p><p>多读一年书，工资溢价约6%-8%。</p><p>但<span class="hl-red">本科起薪中位数，不超过六千</span>。</p></div><div class="para"><p>回报率一降，就说教育贬值。</p><p>教育被推着窄化，回报率再跟着降。</p><p><span class="hl-teal">怪圈就此形成。</span></p></div></div></div></body></html>
