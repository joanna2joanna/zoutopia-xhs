<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>Vol.03 卡5</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#e8f5f0; font-family:"PingFang SC","Hiragino Sans GB",sans-serif; }
  .card { width:1080px; height:1350px; background:#fffef7; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header-strip { background:#F9A825; padding:22px 75px; display:flex; align-items:center; justify-content:space-between; border-right:12px solid transparent; }
  .header-strip .brand { font-size:26px; color:#fff; letter-spacing:5px; font-weight:800; }
  .header-strip .tag { font-size:22px; color:#E3F2FD; letter-spacing:3px; font-weight:700; }
  .body-text { flex:1; padding:36px 75px 48px; display:flex; flex-direction:column; justify-content:center; border-right:12px solid transparent; border-image:repeating-linear-gradient(0deg,#ff6b6b 0px,#ff6b6b 30px,#ffd93d 30px,#ffd93d 60px,#00b894 60px,#00b894 90px) 1; }
  .body-text .para { margin-bottom:26px; } .body-text .para:last-child { margin-bottom:0; }
  .body-text p { font-size:38px; line-height:1.5; letter-spacing:1.2px; margin:0; color:#2d3436; padding-right:16px; }
  .hl-red   { background:linear-gradient(180deg,transparent 55%,#ff7675 55%); padding:0 4px; font-weight:700; }
  .hl-yellow{ background:linear-gradient(180deg,transparent 55%,#ffeaa7 55%); padding:0 4px; font-weight:700; }
  .hl-teal  { color:#00b894; font-weight:700; background:linear-gradient(180deg,transparent 55%,#dfe6e9 55%); padding:0 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="header-strip"><span class="brand">说走就走的走托邦</span><span class="tag">Vol.03</span></div>
  <div class="body-text">
    <div class="para"><p>年及四十，不算太老，还很幼稚。</p></div>
    <div class="para"><p>慢慢有了<span class="hl-yellow">看破规则的智慧</span>，</p><p>和<span class="hl-yellow">无视标准的勇气</span>。</p></div>
    <div class="para"><p>以前觉得，</p><p>幼稚是没长大。</p></div>
    <div class="para"><p>现在觉得，</p><p>小孩子，</p><p><span class="hl-yellow">才是过家家游戏的原住民</span>。</p></div>
    <div class="para"><p>也许造物主如此看待我们。</p><p>活得轻松、活得痛苦，</p><p>也许只是造物主，</p><p>坐在客厅地板上，</p><p>随手搭出的游戏场景。</p></div>
    <div class="para"><p><span class="hl-red">"宇宙级别的楚门世界"</span>。</p></div>
  </div>
</div>
</body>
</html>
